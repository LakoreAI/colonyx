<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" aria-labelledby="title desc" role="img">
  <title id="title">Colonyx Logo</title>
  <desc id="desc">Minimalist swarm of geometric dots converging to a central point — symbolizing collective intelligence</desc>
  
  <!-- Central core -->
  <circle cx="100" cy="100" r="11" fill="#0EA5E9" stroke="#111827" stroke-width="3"/>
  
  <!-- Swarm dots in converging formation -->
  <!-- Layer 1: closer ring/orbit -->
  <circle cx="72" cy="78" r="5" fill="#22D3EE"/>
  <circle cx="128" cy="75" r="5" fill="#22D3EE"/>
  <circle cx="65" cy="115" r="5" fill="#22D3EE"/>
  <circle cx="135" cy="122" r="5" fill="#22D3EE"/>
  
  <!-- Layer 2: mid swarm -->
  <circle cx="48" cy="55" r="4.5" fill="#67E8F9"/>
  <circle cx="85" cy="42" r="4.5" fill="#67E8F9"/>
  <circle cx="150" cy="48" r="4.5" fill="#67E8F9"/>
  <circle cx="155" cy="92" r="4.5" fill="#67E8F9"/>
  <circle cx="45" cy="138" r="4.5" fill="#67E8F9"/>
  <circle cx="112" cy="155" r="4.5" fill="#67E8F9"/>
  
  <!-- Layer 3: outer agents -->
  <circle cx="32" cy="72" r="4" fill="#BAE6FD"/>
  <circle cx="168" cy="65" r="4" fill="#BAE6FD"/>
  <circle cx="38" cy="125" r="4" fill="#BAE6FD"/>
  <circle cx="162" cy="135" r="4" fill="#BAE6FD"/>
  <circle cx="78" cy="28" r="4" fill="#BAE6FD"/>
  <circle cx="125" cy="28" r="4" fill="#BAE6FD"/>
  
  <!-- Very subtle directional connection lines (optional minimal guidance) -->
  <line x1="72" y1="78" x2="100" y2="100" stroke="#111827" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="128" y1="75" x2="100" y2="100" stroke="#111827" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="65" y1="115" x2="100" y2="100" stroke="#111827" stroke-width="1.5" stroke-opacity="0.25"/>
</svg>
